            #       az deployment group create --resource-group rg-${{ env.PROJECT_NAME }}-${{ env.AZURE_ENV }}-${{ env.PROJECT_VERSION }} --template-file ./Azure/resources/stvm.bicep --parameters project_name=${{ env.PROJECT_NAME }} environment=${{ env.AZURE_ENV }} version=${{ env.PROJECT_VERSION }} 

            - name: Copy compose.yml and .env to VM
              env:
                AZURE_DB_PASSWORD: ${{ secrets.AZURE_DB_PASSWORD }}
                N8N_ENCRYPTION_KEY: ${{ secrets.N8N_ENCRYPTION_KEY }}
              run: |
                set -euo pipefail
                STORAGE_ACCOUNT_KEY="$(az storage account keys list --resource-group rg-${{ env.PROJECT_NAME }}-${{ env.AZURE_ENV }}-${{ env.PROJECT_VERSION }} --account-name stvm${{ env.PROJECT_NAME }}${{ env.AZURE_ENV }}${{ env.PROJECT_VERSION }} --query "[0].value" -o tsv)"
                VM_NAME="vm-${{ env.PROJECT_NAME }}-${{ env.AZURE_ENV }}-${{ env.PROJECT_VERSION }}"
                VM_RG="rg-${{ env.PROJECT_NAME }}-${{ env.AZURE_ENV }}-${{ env.PROJECT_VERSION }}"
                REMOTE_DIR="/home/azureuser/n8n"

                COMPOSE_B64="$(base64 -w0 "$GITHUB_WORKSPACE/Azure/conf/compose.yml")"

                if [ -z "${N8N_ENCRYPTION_KEY:-}" ]; then
                  echo "::error::Missing secret N8N_ENCRYPTION_KEY"
                  exit 1
                fi

                {
                  echo "STORAGE_ACCOUNT_NAME=st${{ env.PROJECT_NAME }}${{ env.AZURE_ENV }}${{ env.PROJECT_VERSION }}"
                  printf 'STORAGE_PASSWORD=%s\n' "$STORAGE_ACCOUNT_KEY"
                  echo "N8N_SUBDOMAIN=n8n"
                  echo "DOMAIN=gaby.com"
                  printf 'ENCRYPTION_KEY=%s\n' "$N8N_ENCRYPTION_KEY"
                  echo "TZ=America/Toronto"
                  echo "DB_NAME=PSQL_N8N"
                  echo "DB_PORT=5432"
                  echo "DB_HOST=psql-${{ env.PROJECT_NAME }}-${{ env.AZURE_ENV }}-${{ env.PROJECT_VERSION }}.postgres.database.azure.com"
                  echo "DB_USER=psqladmin@psql-${{ env.PROJECT_NAME }}-${{ env.AZURE_ENV }}-${{ env.PROJECT_VERSION }}"
                  echo "DB_SSL=true"
                  printf 'DB_PASSWORD=%s\n' "$AZURE_DB_PASSWORD"
                } >"$RUNNER_TEMP/n8n.env"
                ENV_B64="$(base64 -w0 "$RUNNER_TEMP/n8n.env")"

                if [ ! -s "$GITHUB_WORKSPACE/Azure/conf/compose.yml" ]; then
                  echo "::error::Local compose.yml is missing or empty"
                  exit 1
                fi
                if [ ! -s "$RUNNER_TEMP/n8n.env" ]; then
                  echo "::error::Generated .env is empty"
                  exit 1
                fi

                az vm run-command invoke \
                  --command-id RunShellScript \
                  --name "$VM_NAME" \
                  --resource-group "$VM_RG" \
                  --scripts "set -euo pipefail
                    REMOTE_DIR='$REMOTE_DIR'
                    sudo mkdir -p \"\$REMOTE_DIR\"
                    printf '%s' '$COMPOSE_B64' | base64 -d | sudo tee \"\$REMOTE_DIR/compose.yml\" >/dev/null
                    printf '%s' '$ENV_B64' | base64 -d | sudo tee \"\$REMOTE_DIR/.env\" >/dev/null
                    sudo chown -R azureuser:azureuser \"\$REMOTE_DIR\"
                    sudo chmod 644 \"\$REMOTE_DIR/compose.yml\"
                    sudo chmod 640 \"\$REMOTE_DIR/.env\"
                    if [ ! -s \"\$REMOTE_DIR/compose.yml\" ]; then
                      echo 'ERROR: compose.yml is empty after copy' >&2
                      exit 1
                    fi
                    if [ ! -s \"\$REMOTE_DIR/.env\" ]; then
                      echo 'ERROR: .env is empty after copy' >&2
                      exit 1
                    fi
                    ls -la \"\$REMOTE_DIR\"
                    wc -c \"\$REMOTE_DIR/compose.yml\" \"\$REMOTE_DIR/.env\"
                  " \
                  --query "value[0].message" \
                  --output tsv | tee "$RUNNER_TEMP/copy-compose.log"

                COMPOSE_SIZE="$(awk '/\/compose\.yml$/ {print $1; exit}' "$RUNNER_TEMP/copy-compose.log")"
                ENV_SIZE="$(awk '/\/\.env$/ {print $1; exit}' "$RUNNER_TEMP/copy-compose.log")"

                if [ -z "${COMPOSE_SIZE:-}" ] || [ -z "${ENV_SIZE:-}" ]; then
                  echo "::error::Unable to read remote file sizes from copy step output."
                  cat "$RUNNER_TEMP/copy-compose.log"
                  exit 1
                fi

                if [ "$COMPOSE_SIZE" -eq 0 ] || [ "$ENV_SIZE" -eq 0 ]; then
                  echo "::error::Remote files are empty after copy (compose.yml=$COMPOSE_SIZE, .env=$ENV_SIZE)."
                  cat "$RUNNER_TEMP/copy-compose.log"
                  exit 1
                fi

            - name: Run n8n bootstrap on VM
              run: |
                set -euo pipefail
                az vm run-command invoke \
                  --command-id RunShellScript \
                  --name "vm-${{ env.PROJECT_NAME }}-${{ env.AZURE_ENV }}-${{ env.PROJECT_VERSION }}" \
                  --resource-group "rg-${{ env.PROJECT_NAME }}-${{ env.AZURE_ENV }}-${{ env.PROJECT_VERSION }}" \
                  --scripts @"$GITHUB_WORKSPACE/Azure/conf/n8n.sh" \
                  --parameters /home/azureuser/n8n
            
            - name : Logout of Azure
              run: |
                  az logout
