name: Azure Base Infrastructure Deployment
on:
    push:
        branches:
            - main
        paths:
            - Azure/**
            - .github/workflows/azure-infra.yml
            - .github/workflows/azure-project.yml
            - .github/workflows/azure-n8n.yml
            - .github/workflows/azure-gh-runner.yml
    pull_request:
        paths:
            - Azure/**
            - .github/workflows/azure-infra.yml
            - .github/workflows/azure-project.yml
            - .github/workflows/azure-n8n.yml
            - .github/workflows/azure-gh-runner.yml
    workflow_dispatch:

env:
    AZURE_CREDENTIALS: '{"clientId": "${{secrets.AZURE_CLIENT_ID}}", "clientSecret": "${{secrets.AZURE_CLIENT_SECRET}}", "subscriptionId": "${{secrets.AZURE_SUBSCRIPTION_ID}}", "tenantId": "${{secrets.AZURE_TENANT_ID}}"}'
    AZURE_ENV: ${{vars.AZURE_ENV}}
    PROJECT_NAME: ${{vars.PROJECT_NAME}}
    PROJECT_VERSION: ${{vars.PROJECT_VERSION}}
    LOCATION: ${{vars.LOCATION}}

jobs:
    build:
        runs-on: ubuntu-latest
        environment: test
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Lint Bicep
              run: |
                  set -euo pipefail
                  LOG_FILE="$RUNNER_TEMP/infra-build.log"
                  : > "$LOG_FILE"
                  az bicep lint --file Azure/resources/rg.bicep
                  az bicep lint --file Azure/resources/nw.bicep
                  az bicep lint --file Azure/resources/vnet.bicep
                  az bicep lint --file Azure/resources/kv.bicep
                  az bicep lint --file Azure/resources/privatedns.bicep
                  az bicep lint --file Azure/resources/nic.bicep
                  az bicep lint --file Azure/resources/vm.bicep
                  az bicep lint --file Azure/resources/pip.bicep
                  az bicep lint --file Azure/resources/psql-db.bicep
                  az bicep lint --file Azure/resources/stvm.bicep
                  az bicep lint --file Azure/resources/nsg.bicep
                  {
                    echo "Lint completed successfully"
                  } >> "$LOG_FILE"

            - name: Bicep Build
              run: |
                  set -euo pipefail
                  LOG_FILE="$RUNNER_TEMP/infra-build.log"
                  mkdir -p ./Azure/resources/compiled
                  for file in Azure/resources/*.bicep; do
                    az bicep build --file "$file" --outdir ./Azure/resources/compiled 2>&1 | tee -a "$LOG_FILE"
                  done
                  {
                    echo "Build completed successfully"
                  } >> "$LOG_FILE"
            - name: Upload build artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: infra-compiled-${{ github.run_id }}
                  path: ./Azure/resources/compiled
                  if-no-files-found: error

            - name: Upload build log artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: infra-build-log-${{ github.run_id }}
                  path: ${{ runner.temp }}/infra-build.log
                  if-no-files-found: warn

    rg:
        needs: build
        environment: test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Login to Azure
              uses: azure/login@v2
              with:
                  creds: ${{ env.AZURE_CREDENTIALS }}

            - name: Deploy Resource Group
              run: |
                  set -euo pipefail
                  LOG_FILE="$RUNNER_TEMP/infra-rg.log"
                  az deployment sub create --name 'rg-common-${{ env.AZURE_ENV }}-${{ env.PROJECT_VERSION }}' --location ${{ env.LOCATION }} --template-file ./Azure/resources/rg.bicep 2>&1 | tee -a "$LOG_FILE"
                  az deployment sub create --name 'rg-privatedns-${{ env.AZURE_ENV }}-${{ env.PROJECT_VERSION }}' --location ${{ env.LOCATION }} --template-file ./Azure/resources/rg.bicep 2>&1 | tee -a "$LOG_FILE"
                  az deployment sub create --name 'rg-network-${{ env.AZURE_ENV }}-${{ env.PROJECT_VERSION }}' --location ${{ env.LOCATION }} --template-file ./Azure/resources/rg.bicep 2>&1 | tee -a "$LOG_FILE"
                  az deployment sub create --name 'rg-database-${{ env.AZURE_ENV }}-${{ env.PROJECT_VERSION }}' --location ${{ env.LOCATION }} --template-file ./Azure/resources/rg.bicep 2>&1 | tee -a "$LOG_FILE"

            - name: Logout of Azure
              run: |
                  az logout

            - name: Upload rg artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: infra-rg-${{ github.run_id }}
                  path: ${{ runner.temp }}/infra-rg.log
                  if-no-files-found: warn
    
    deploy:
        needs:
            - rg
            - checkov_scan
        environment: test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Login to Azure
              uses: azure/login@v2
              with:
                  creds: ${{ env.AZURE_CREDENTIALS }}

            - name: Check if Key Vault exists
              id: check_kv
              shell: bash
              run: |
                set -euo pipefail
                KV_NAME="kv-${{ env.AZURE_ENV }}-${{ env.PROJECT_VERSION }}"
                RG_NAME="rg-common-${{ env.AZURE_ENV }}-${{ env.PROJECT_VERSION }}"

                if az keyvault show --name "$KV_NAME" --resource-group "$RG_NAME" >/dev/null 2>&1; then
                    echo "create_kv=false" >> "$GITHUB_OUTPUT"
                else
                    echo "create_kv=true" >> "$GITHUB_OUTPUT"
                fi
                
            - name: Deploy Resources
              run: |
                set -euo pipefail
                LOG_FILE="$RUNNER_TEMP/infra-deploy.log"
                az deployment group create --resource-group rg-network-${{ env.AZURE_ENV }}-${{ env.PROJECT_VERSION }} --template-file ./Azure/resources/nw.bicep 2>&1 | tee -a "$LOG_FILE"
                az deployment group create --resource-group rg-network-${{ env.AZURE_ENV }}-${{ env.PROJECT_VERSION }} --template-file ./Azure/resources/vnet.bicep --parameters project_name=${{ env.PROJECT_NAME }} environment=${{ env.AZURE_ENV }} version=${{ env.PROJECT_VERSION }} 2>&1 | tee -a "$LOG_FILE"
                az deployment group create --resource-group rg-privatedns-${{ env.AZURE_ENV }}-${{ env.PROJECT_VERSION }} --template-file ./Azure/resources/privatedns.bicep --parameters environment=${{ env.AZURE_ENV }} version=${{ env.PROJECT_VERSION }} 2>&1 | tee -a "$LOG_FILE"
                az deployment group create --resource-group rg-common-${{ env.AZURE_ENV }}-${{ env.PROJECT_VERSION }} --template-file ./Azure/resources/kv.bicep --parameters project_name=${{ env.PROJECT_NAME }} environment=${{ env.AZURE_ENV }} version=${{ env.PROJECT_VERSION }} objectId=${{ secrets.AZURE_GITHUB_OBJECT_ID }} createKv=${{ steps.check_kv.outputs.create_kv }} 2>&1 | tee -a "$LOG_FILE"
             
           
            - name: Logout of Azure 
              run: |
                  az logout              

            - name: Upload deploy artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: infra-deploy-${{ github.run_id }}
                  path: ${{ runner.temp }}/infra-deploy.log
                  if-no-files-found: warn

    checkov_scan:
        needs: build
        environment: test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Download build artifact
              uses: actions/download-artifact@v4
              with:
                  name: infra-compiled-${{ github.run_id }}
                  path: ./_artifacts/infra-compiled

            - name: Normalize compiled templates path
              run: |
                  set -euo pipefail
                  mkdir -p ./Azure/resources/compiled

                  if [ -d ./_artifacts/infra-compiled/Azure/resources/compiled ]; then
                    cp -a ./_artifacts/infra-compiled/Azure/resources/compiled/. ./Azure/resources/compiled/
                  elif [ -d ./_artifacts/infra-compiled/compiled ]; then
                    cp -a ./_artifacts/infra-compiled/compiled/. ./Azure/resources/compiled/
                  else
                    cp -a ./_artifacts/infra-compiled/. ./Azure/resources/compiled/
                  fi

                  if ! find ./Azure/resources/compiled -maxdepth 1 -type f -name '*.json' | grep -q .; then
                    echo "::error::No compiled ARM templates found in ./Azure/resources/compiled"
                    echo "Downloaded artifact tree:"
                    find ./_artifacts -maxdepth 5 -print
                    exit 1
                  fi

            - name: Checkov Scan (ARM compiled)
              uses: bridgecrewio/checkov-action@v12
              with:
                  directory: ./Azure/resources/compiled
                  framework: arm
                  skip_check: CKV_AZURE_50,CKV_AZURE_97,CKV_AZURE_151

