name: Azure Self-Hosted Runner for Key Vault Private Link

on:
  workflow_dispatch:
    inputs:
      runner_name:
        description: "Runner short name (used in VM/NIC names)"
        required: false
        default: "ghkv"
      runner_labels:
        description: "Comma-separated GitHub runner labels"
        required: false
        default: "self-hosted,linux,azure,kv-private"
      vm_size:
        description: "Azure VM size"
        required: false
        default: "Standard_B2s"

env:
  AZURE_CREDENTIALS: '{"clientId": "${{secrets.AZURE_CLIENT_ID}}", "clientSecret": "${{secrets.AZURE_CLIENT_SECRET}}", "subscriptionId": "${{secrets.AZURE_SUBSCRIPTION_ID}}", "tenantId": "${{secrets.AZURE_TENANT_ID}}"}'
  AZURE_ENV: ${{ vars.AZURE_ENV }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  PROJECT_VERSION: ${{ vars.PROJECT_VERSION }}
  LOCATION: ${{ vars.LOCATION }}

jobs:
  deploy_selfhost_runner:
    name: Deploy Runner VM + KV RBAC
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Create runner VM in VNet subnet
        shell: bash
        run: |
          set -euo pipefail

          RUNNER_SHORT="${{ github.event.inputs.runner_name }}"
          RUNNER_SHORT="${RUNNER_SHORT:-ghkv}"
          RUNNER_RG="rg-ghrunner-${AZURE_ENV}-${PROJECT_VERSION}"
          RUNNER_VM_NAME="vm-${RUNNER_SHORT}-${AZURE_ENV}-${PROJECT_VERSION}"
          RUNNER_NIC_NAME="nic-${RUNNER_SHORT}-${AZURE_ENV}-${PROJECT_VERSION}"
          VNET_RG="rg-network-${AZURE_ENV}-${PROJECT_VERSION}"
          SUBNET_NAME="snet-${PROJECT_NAME}-${AZURE_ENV}-${PROJECT_VERSION}"

          VNET_NAME="$(az network vnet list \
            --resource-group "${VNET_RG}" \
            --query "[?contains(name, '-${AZURE_ENV}-${PROJECT_VERSION}')].name | [0]" \
            --output tsv)"

          if [ -z "${VNET_NAME}" ]; then
            echo "::error::No VNet found in ${VNET_RG} for environment/version ${AZURE_ENV}/${PROJECT_VERSION}."
            exit 1
          fi

          echo "Ensuring runner resource group: ${RUNNER_RG}"
          az group create --name "${RUNNER_RG}" --location "${LOCATION}" --output none

          SUBNET_ID="$(az network vnet subnet show \
            --resource-group "${VNET_RG}" \
            --vnet-name "${VNET_NAME}" \
            --name "${SUBNET_NAME}" \
            --query id \
            --output tsv)"

          if ! az network nic show --resource-group "${RUNNER_RG}" --name "${RUNNER_NIC_NAME}" >/dev/null 2>&1; then
            echo "Creating NIC ${RUNNER_NIC_NAME} in subnet ${SUBNET_NAME}"
            az network nic create \
              --resource-group "${RUNNER_RG}" \
              --name "${RUNNER_NIC_NAME}" \
              --subnet "${SUBNET_ID}" \
              --output none
          else
            echo "NIC ${RUNNER_NIC_NAME} already exists"
          fi

          if ! az vm show --resource-group "${RUNNER_RG}" --name "${RUNNER_VM_NAME}" >/dev/null 2>&1; then
            echo "Creating VM ${RUNNER_VM_NAME}"
            az vm create \
              --resource-group "${RUNNER_RG}" \
              --name "${RUNNER_VM_NAME}" \
              --nics "${RUNNER_NIC_NAME}" \
              --image "Ubuntu2204" \
              --size "${{ github.event.inputs.vm_size }}" \
              --admin-username "azureuser" \
              --authentication-type "ssh" \
              --generate-ssh-keys \
              --assign-identity \
              --output none
          else
            echo "VM ${RUNNER_VM_NAME} already exists"
          fi

      - name: Assign KV permissions to runner managed identity
        shell: bash
        run: |
          set -euo pipefail

          RUNNER_SHORT="${{ github.event.inputs.runner_name }}"
          RUNNER_SHORT="${RUNNER_SHORT:-ghkv}"
          RUNNER_RG="rg-ghrunner-${AZURE_ENV}-${PROJECT_VERSION}"
          RUNNER_VM_NAME="vm-${RUNNER_SHORT}-${AZURE_ENV}-${PROJECT_VERSION}"
          KV_RG="rg-common-${AZURE_ENV}-${PROJECT_VERSION}"
          KV_NAME="kv-${PROJECT_NAME}-${AZURE_ENV}-${PROJECT_VERSION}"

          KV_ID="$(az keyvault show --name "${KV_NAME}" --resource-group "${KV_RG}" --query id --output tsv)"
          RUNNER_PRINCIPAL_ID="$(az vm identity show --resource-group "${RUNNER_RG}" --name "${RUNNER_VM_NAME}" --query principalId --output tsv)"

          echo "Runner principal: ${RUNNER_PRINCIPAL_ID}"
          echo "KV scope: ${KV_ID}"

          for ROLE_NAME in "User Access Administrator" "Key Vault Secrets Officer" "Key Vault Secrets User"; do
            EXISTING_COUNT="$(az role assignment list \
              --assignee-object-id "${RUNNER_PRINCIPAL_ID}" \
              --scope "${KV_ID}" \
              --role "${ROLE_NAME}" \
              --query 'length(@)' \
              --output tsv)"

            if [ "${EXISTING_COUNT}" = "0" ]; then
              echo "Assigning role: ${ROLE_NAME}"
              az role assignment create \
                --assignee-object-id "${RUNNER_PRINCIPAL_ID}" \
                --assignee-principal-type ServicePrincipal \
                --role "${ROLE_NAME}" \
                --scope "${KV_ID}" \
                --output none
            else
              echo "Role already present: ${ROLE_NAME}"
            fi
          done

      - name: Register and start GitHub Actions runner service
        shell: bash
        env:
          GH_RUNNER_PAT: ${{ secrets.GH_RUNNER_PAT }}
        run: |
          set -euo pipefail

          if [ -z "${GH_RUNNER_PAT:-}" ]; then
            echo "::error::Missing required GitHub secret GH_RUNNER_PAT (needs permission to manage self-hosted runners)."
            exit 1
          fi

          RUNNER_SHORT="${{ github.event.inputs.runner_name }}"
          RUNNER_SHORT="${RUNNER_SHORT:-ghkv}"
          RUNNER_LABELS="${{ github.event.inputs.runner_labels }}"
          RUNNER_LABELS="${RUNNER_LABELS:-self-hosted,linux,azure,kv-private}"
          RUNNER_VERSION="2.327.1"
          RUNNER_RG="rg-ghrunner-${AZURE_ENV}-${PROJECT_VERSION}"
          RUNNER_VM_NAME="vm-${RUNNER_SHORT}-${AZURE_ENV}-${PROJECT_VERSION}"
          GH_REPO_URL="https://github.com/${GITHUB_REPOSITORY}"

          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

          RUNNER_TOKEN="$(curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_RUNNER_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runners/registration-token" \
            | jq -r '.token')"

          if [ -z "${RUNNER_TOKEN}" ] || [ "${RUNNER_TOKEN}" = "null" ]; then
            echo "::error::Could not create GitHub runner registration token."
            exit 1
          fi

          az vm run-command invoke \
            --command-id RunShellScript \
            --name "${RUNNER_VM_NAME}" \
            --resource-group "${RUNNER_RG}" \
            --scripts "
              set -euo pipefail

              sudo apt-get update
              sudo apt-get install -y curl jq ca-certificates tar gzip

              if ! command -v az >/dev/null 2>&1; then
                curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
              fi

              sudo mkdir -p /home/azureuser/actions-runner
              sudo chown -R azureuser:azureuser /home/azureuser/actions-runner
              cd /home/azureuser/actions-runner

              if [ ! -f ./config.sh ]; then
                ARCH=\$(uname -m)
                if [ \"\$ARCH\" = \"x86_64\" ]; then
                  RUNNER_ARCH=x64
                elif [ \"\$ARCH\" = \"aarch64\" ] || [ \"\$ARCH\" = \"arm64\" ]; then
                  RUNNER_ARCH=arm64
                else
                  echo \"Unsupported architecture: \$ARCH\" >&2
                  exit 1
                fi

                curl -fsSL -o actions-runner.tar.gz \"https://github.com/actions/runner/releases/download/v${RUNNER_VERSION}/actions-runner-linux-\${RUNNER_ARCH}-${RUNNER_VERSION}.tar.gz\"
                tar xzf actions-runner.tar.gz
                sudo ./bin/installdependencies.sh
              fi

              if [ ! -f .runner ]; then
                sudo -u azureuser ./config.sh \
                  --unattended \
                  --url \"${GH_REPO_URL}\" \
                  --token \"${RUNNER_TOKEN}\" \
                  --name \"${RUNNER_VM_NAME}\" \
                  --labels \"${RUNNER_LABELS}\" \
                  --work \"_work\" \
                  --replace
              else
                echo \"Runner already configured locally; skipping re-registration.\"
              fi

              sudo ./svc.sh install azureuser || true
              sudo ./svc.sh restart || sudo ./svc.sh start
            " \
            --query "value[0].message" \
            --output tsv

      - name: Validate private-link KV connectivity from runner VM
        shell: bash
        run: |
          set -euo pipefail

          RUNNER_SHORT="${{ github.event.inputs.runner_name }}"
          RUNNER_SHORT="${RUNNER_SHORT:-ghkv}"
          RUNNER_RG="rg-ghrunner-${AZURE_ENV}-${PROJECT_VERSION}"
          RUNNER_VM_NAME="vm-${RUNNER_SHORT}-${AZURE_ENV}-${PROJECT_VERSION}"
          KV_NAME="kv-${PROJECT_NAME}-${AZURE_ENV}-${PROJECT_VERSION}"

          az vm run-command invoke \
            --command-id RunShellScript \
            --name "${RUNNER_VM_NAME}" \
            --resource-group "${RUNNER_RG}" \
            --scripts "
              set -euo pipefail

              echo \"Checking DNS resolution for Key Vault through private endpoint\"
              getent hosts ${KV_NAME}.vault.azure.net || true

              az login --identity --allow-no-subscriptions >/dev/null

              for i in \$(seq 1 20); do
                if az keyvault secret list --vault-name ${KV_NAME} --maxresults 1 >/dev/null 2>&1; then
                  echo \"Managed identity can read Key Vault secrets.\"
                  exit 0
                fi

                echo \"Waiting for RBAC propagation... attempt \$i/20\"
                sleep 15
              done

              echo \"Timed out waiting for Key Vault RBAC to propagate.\" >&2
              exit 1
            " \
            --query "value[0].message" \
            --output tsv

      - name: Logout of Azure
        if: always()
        shell: bash
        run: |
          az logout
