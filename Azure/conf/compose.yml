services: 
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - n8n
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./conf:/etc/caddy/
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - n8n_network

  n8n:
    env_file: .env
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - TZ=${TZ}
      - GENERIC_TIMEZONE=${TZ} 
      - N8N_ENCRYPTION_KEY=${ENCRYPTION_KEY}

      - N8N_HOST=${N8N_SUBDOMAIN}.${DOMAIN}
      - WEBHOOK_URL=https://${N8N_SUBDOMAIN}.${DOMAIN}/webhook
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_RUNNERS_ENABLED=true

      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=${DB_HOST}
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${DB_NAME}
      - DB_POSTGRESDB_USER=${DB_USER}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      - DB_POSTGRESDB_SSL=${DB_SSL}
      - DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED=${DB_SSL_REJECT_UNAUTHORIZED}
      - DB_POSTGRESDB_SCHEMA=public
      - EXECUTIONS_MODE=regular

    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - n8n_network

volumes:
  caddy_data:
  caddy_config:
  n8n_data:

networks:
  n8n_network:
