name: Create Resource Group
on: 
    push:
        branches:
             - main
env:
    AZURE_CREDENTIALS: '{"clientId": "${{secrets.AZURE_CLIENT_ID}}", "clientSecret": "${{secrets.AZURE_CLIENT_SECRET}}", "subscriptionId": "${{secrets.AZURE_SUBSCRIPTION_ID}}", "tenantId": "${{secrets.AZURE_TENANT_ID}}"}'
    AZURE_ENV: ${{vars.AZURE_ENV}}
    PROJECT_NAME: ${{vars.PROJECT_NAME}}
    PROJECT_VERSION: ${{vars.PROJECT_VERSION}}
    LOCATION: ${{vars.LOCATION}}

jobs: 
    create_rg:
        runs-on: ubuntu-latest
        environment: "test"
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Login to Azure
              uses: azure/login@v2
              with:
                creds: ${{ env.AZURE_CREDENTIALS }}
            
            - name: Lint Bicep
              run: |
                az bicep lint --file resources/rg.bicep

            - name: Bicep Build
              run: |
                mkdir -p ./resources/compiled
                az bicep build --file resources/rg.bicep --outdir ./resources/compiled

            - name: Deploy Resource Group
              run: |
                az deployment sub create --location ${{ env.LOCATION }} --template-file ./resources/compiled/rg.json --parameters env=${{ env.AZURE_ENV }} version=${{ env.PROJECT_VERSION }} name='common' --what-if
                az deployment sub create --location ${{ env.LOCATION }} --template-file ./resources/compiled/rg.json --parameters env=${{ env.AZURE_ENV }} version=${{ env.PROJECT_VERSION }} name='network' --what-if
                az deployment sub create --location ${{ env.LOCATION }} --template-file ./resources/compiled/rg.json --parameters env=${{ env.AZURE_ENV }} version=${{ env.PROJECT_VERSION }} name='privatedns' --what-if
                az deployment sub create --location ${{ env.LOCATION }} --template-file ./resources/compiled/rg.json --parameters env=${{ env.AZURE_ENV }} version=${{ env.PROJECT_VERSION }} name='database' --what-if
                az deployment sub create --location ${{ env.LOCATION }} --template-file ./resources/compiled/rg.json --parameters env=${{ env.AZURE_ENV }} version=${{ env.PROJECT_VERSION }} name=${{ env.PROJECT_NAME }} --what-if

            - name: Logout of Azure
              run: |
                az logout

    create_artifact:
        needs: create_rg
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                name: rg-artifact-${{ env.PROJECT_NAME }}
                path: ./resources/compiled

            - name: Checkov Scan
              uses: bridgecrewio/checkov-action@v12
              with:
                directory: ./resources/compiled
                framework: bicep
             
            # - name: Clean up compiled files
            #   run: |
            #     rm -rf ./resources/compiled

                